<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 800 720" role="img" aria-labelledby="deployment-title deployment-desc">
  <title id="deployment-title">Supply Open Sky physical deployment</title>
  <desc id="deployment-desc">Software components grouped by their deployment target. Hub Server (on-premise) hosts sos-hub, sos-scheduler and sos-dashboard. A Development machine hosts sos-simulator, which connects to sos-hub via REST. Each Node (Raspberry Pi) hosts the sos-node firmware. Each Drone hosts the sos-drone firmware (custom) and a separate Flight Controller (ArduPilot or PX4, third-party). Hub talks to Nodes over LoRa Mesh / Reticulum. Nodes talk to Drones over a local LoRa Mesh link. sos-drone talks to the Flight Controller over MAVLink UART.</desc>

  <style>
    .label-th { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; font-size: 14px; font-weight: 500; }
    .label-ts { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; font-size: 12px; font-weight: 400; }
    .label-tn { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; font-size: 10px; font-weight: 400; font-style: italic; }
  </style>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9C9A92"/>
    </marker>
  </defs>

  <!-- Hub Server cluster -->
  <rect x="40" y="60" width="380" height="245" rx="10" fill="none" stroke="#5F5E5A" stroke-width="0.5" stroke-dasharray="4 3"/>
  <text class="label-ts" x="230" y="80" text-anchor="middle" fill="#9C9A92">Hub Server (on-premise)</text>

  <!-- sos-hub box -->
  <g>
    <rect x="80" y="95" width="300" height="50" rx="8" fill="#3C3489" stroke="#AFA9EC" stroke-width="0.5"/>
    <text class="label-th" x="230" y="115" text-anchor="middle" dominant-baseline="central" fill="#EEEDFE">sos-hub</text>
    <text class="label-tn" x="230" y="133" text-anchor="middle" dominant-baseline="central" fill="#EEEDFE">TypeScript / Node.js</text>
  </g>

  <!-- sos-scheduler box -->
  <g>
    <rect x="80" y="165" width="300" height="50" rx="8" fill="#3C3489" stroke="#AFA9EC" stroke-width="0.5"/>
    <text class="label-th" x="230" y="185" text-anchor="middle" dominant-baseline="central" fill="#EEEDFE">sos-scheduler</text>
    <text class="label-tn" x="230" y="203" text-anchor="middle" dominant-baseline="central" fill="#EEEDFE">Python</text>
  </g>

  <!-- sos-dashboard box -->
  <g>
    <rect x="80" y="235" width="300" height="50" rx="8" fill="#3C3489" stroke="#AFA9EC" stroke-width="0.5"/>
    <text class="label-th" x="230" y="255" text-anchor="middle" dominant-baseline="central" fill="#EEEDFE">sos-dashboard</text>
    <text class="label-tn" x="230" y="273" text-anchor="middle" dominant-baseline="central" fill="#EEEDFE">React — served by sos-hub</text>
  </g>

  <!-- Internal: hub ↔ scheduler (REST) -->
  <line x1="230" y1="145" x2="230" y2="165" stroke="#9C9A92" stroke-width="1" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <text class="label-tn" x="240" y="156" dominant-baseline="central" fill="#9C9A92">Internal REST API</text>

  <!-- Note: hub ↔ dashboard (WebSocket /ws/live + static files) — described in §5, omitted here for clarity -->

  <!-- Development machine cluster -->
  <rect x="460" y="60" width="300" height="110" rx="10" fill="none" stroke="#5F5E5A" stroke-width="0.5" stroke-dasharray="4 3"/>
  <text class="label-ts" x="610" y="80" text-anchor="middle" fill="#9C9A92">Development machine (test only)</text>

  <!-- sos-simulator box -->
  <g>
    <rect x="500" y="95" width="220" height="50" rx="8" fill="#3C3489" stroke="#AFA9EC" stroke-width="0.5"/>
    <text class="label-th" x="610" y="115" text-anchor="middle" dominant-baseline="central" fill="#EEEDFE">sos-simulator</text>
    <text class="label-tn" x="610" y="133" text-anchor="middle" dominant-baseline="central" fill="#EEEDFE">Python</text>
  </g>

  <!-- External: SIM → HUB (one-way) -->
  <line x1="500" y1="120" x2="380" y2="120" stroke="#9C9A92" stroke-width="1" marker-end="url(#arrow)"/>
  <text class="label-tn" x="440" y="103" text-anchor="middle" fill="#9C9A92">POST /api/telemetry/*</text>
  <text class="label-tn" x="440" y="115" text-anchor="middle" fill="#9C9A92">POST /api/events/*</text>

  <!-- External: Hub Server cluster ↔ Node cluster (LoRa Mesh) -->
  <line x1="230" y1="305" x2="230" y2="365" stroke="#9C9A92" stroke-width="1" stroke-dasharray="5 4" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <text class="label-tn" x="240" y="325" dominant-baseline="central" fill="#9C9A92">LoRa Mesh / Reticulum</text>
  <text class="label-tn" x="240" y="340" dominant-baseline="central" fill="#9C9A92">CTL_NODE_PREP, TEL_*, EVT_*</text>

  <!-- Node cluster -->
  <rect x="80" y="365" width="300" height="110" rx="10" fill="none" stroke="#5F5E5A" stroke-width="0.5" stroke-dasharray="4 3"/>
  <text class="label-ts" x="230" y="385" text-anchor="middle" fill="#9C9A92">Node (Raspberry Pi)</text>

  <!-- sos-node box -->
  <g>
    <rect x="120" y="400" width="220" height="50" rx="8" fill="#3C3489" stroke="#AFA9EC" stroke-width="0.5"/>
    <text class="label-th" x="230" y="420" text-anchor="middle" dominant-baseline="central" fill="#EEEDFE">sos-node</text>
    <text class="label-tn" x="230" y="438" text-anchor="middle" dominant-baseline="central" fill="#EEEDFE">Python + Reticulum</text>
  </g>

  <!-- External: Node ↔ Drone (LoRa local link) -->
  <line x1="230" y1="475" x2="230" y2="535" stroke="#9C9A92" stroke-width="1" stroke-dasharray="5 4" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <text class="label-tn" x="240" y="495" dominant-baseline="central" fill="#9C9A92">LoRa Mesh / Reticulum (local link)</text>
  <text class="label-tn" x="240" y="510" dominant-baseline="central" fill="#9C9A92">CTL_HOP_INSTRUCTION</text>

  <!-- Drone cluster -->
  <rect x="80" y="535" width="300" height="170" rx="10" fill="none" stroke="#5F5E5A" stroke-width="0.5" stroke-dasharray="4 3"/>
  <text class="label-ts" x="230" y="555" text-anchor="middle" fill="#9C9A92">Drone</text>

  <!-- sos-drone box (custom: purple) -->
  <g>
    <rect x="120" y="570" width="220" height="55" rx="8" fill="#3C3489" stroke="#AFA9EC" stroke-width="0.5"/>
    <text class="label-th" x="230" y="589" text-anchor="middle" dominant-baseline="central" fill="#EEEDFE">sos-drone</text>
    <text class="label-tn" x="230" y="610" text-anchor="middle" dominant-baseline="central" fill="#EEEDFE">Python + Reticulum (RPi Zero 2W)</text>
  </g>

  <!-- Flight Controller box (third-party: green) -->
  <g>
    <rect x="120" y="650" width="220" height="50" rx="8" fill="#085041" stroke="#5DCAA5" stroke-width="0.5"/>
    <text class="label-th" x="230" y="670" text-anchor="middle" dominant-baseline="central" fill="#E1F5EE">Flight Controller</text>
    <text class="label-tn" x="230" y="688" text-anchor="middle" dominant-baseline="central" fill="#E1F5EE">ArduPilot / PX4</text>
  </g>

  <!-- Internal: sos-drone ↔ Flight Controller (MAVLink) -->
  <line x1="230" y1="625" x2="230" y2="650" stroke="#9C9A92" stroke-width="1" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <text class="label-tn" x="240" y="638" dominant-baseline="central" fill="#9C9A92">MAVLink UART</text>
</svg>
