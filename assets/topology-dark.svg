<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 520" role="img" aria-labelledby="topology-title topology-desc">
  <title id="topology-title">Supply Open Sky network topology</title>
  <desc id="topology-desc">Tree topology branching from a central Hub. Drones transit along segments labeled drones and LoRa to reach Nodes and their descendants. Field transmitters are deployed in villages surrounding selected Nodes.</desc>

  <style>
    .label-th { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; font-size: 14px; font-weight: 500; }
    .label-ts { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; font-size: 12px; font-weight: 400; }
  </style>

  <!-- Hub -->
  <g>
    <rect x="40" y="240" width="80" height="44" rx="8" fill="#3C3489" stroke="#AFA9EC" stroke-width="0.5"/>
    <text class="label-th" x="80" y="262" text-anchor="middle" dominant-baseline="central" fill="#EEEDFE">Hub</text>
  </g>

  <!-- Branch N1 -->
  <g>
    <rect x="200" y="120" width="90" height="40" rx="8" fill="#085041" stroke="#5DCAA5" stroke-width="0.5"/>
    <text class="label-th" x="245" y="140" text-anchor="middle" dominant-baseline="central" fill="#E1F5EE">N1</text>
  </g>
  <g>
    <rect x="360" y="40" width="100" height="40" rx="8" fill="#085041" stroke="#5DCAA5" stroke-width="0.5"/>
    <text class="label-th" x="410" y="60" text-anchor="middle" dominant-baseline="central" fill="#E1F5EE">N1.1</text>
  </g>
  <g>
    <rect x="360" y="160" width="100" height="40" rx="8" fill="#085041" stroke="#5DCAA5" stroke-width="0.5"/>
    <text class="label-th" x="410" y="180" text-anchor="middle" dominant-baseline="central" fill="#E1F5EE">N1.2</text>
  </g>
  <g>
    <rect x="520" y="120" width="110" height="40" rx="8" fill="#085041" stroke="#5DCAA5" stroke-width="0.5"/>
    <text class="label-th" x="575" y="140" text-anchor="middle" dominant-baseline="central" fill="#E1F5EE">N1.2.1</text>
  </g>
  <g>
    <rect x="520" y="200" width="110" height="40" rx="8" fill="#085041" stroke="#5DCAA5" stroke-width="0.5"/>
    <text class="label-th" x="575" y="220" text-anchor="middle" dominant-baseline="central" fill="#E1F5EE">N1.2.2</text>
  </g>

  <!-- Branch N2 -->
  <g>
    <rect x="200" y="360" width="90" height="40" rx="8" fill="#085041" stroke="#5DCAA5" stroke-width="0.5"/>
    <text class="label-th" x="245" y="380" text-anchor="middle" dominant-baseline="central" fill="#E1F5EE">N2</text>
  </g>
  <g>
    <rect x="360" y="320" width="100" height="40" rx="8" fill="#085041" stroke="#5DCAA5" stroke-width="0.5"/>
    <text class="label-th" x="410" y="340" text-anchor="middle" dominant-baseline="central" fill="#E1F5EE">N2.1</text>
  </g>
  <g>
    <rect x="360" y="400" width="100" height="40" rx="8" fill="#085041" stroke="#5DCAA5" stroke-width="0.5"/>
    <text class="label-th" x="410" y="420" text-anchor="middle" dominant-baseline="central" fill="#E1F5EE">N2.2</text>
  </g>

  <!-- Dashed connectors, no arrows -->
  <line x1="120" y1="262" x2="200" y2="140" stroke="#9C9A92" stroke-width="1" stroke-dasharray="5 4" fill="none"/>
  <line x1="120" y1="262" x2="200" y2="380" stroke="#9C9A92" stroke-width="1" stroke-dasharray="5 4" fill="none"/>
  <line x1="290" y1="140" x2="360" y2="60" stroke="#9C9A92" stroke-width="1" stroke-dasharray="5 4" fill="none"/>
  <line x1="290" y1="140" x2="360" y2="180" stroke="#9C9A92" stroke-width="1" stroke-dasharray="5 4" fill="none"/>
  <line x1="460" y1="180" x2="520" y2="140" stroke="#9C9A92" stroke-width="1" stroke-dasharray="5 4" fill="none"/>
  <line x1="460" y1="180" x2="520" y2="220" stroke="#9C9A92" stroke-width="1" stroke-dasharray="5 4" fill="none"/>
  <line x1="290" y1="380" x2="360" y2="340" stroke="#9C9A92" stroke-width="1" stroke-dasharray="5 4" fill="none"/>
  <line x1="290" y1="380" x2="360" y2="420" stroke="#9C9A92" stroke-width="1" stroke-dasharray="5 4" fill="none"/>

  <!-- Segment labels -->
  <text class="label-ts" x="155" y="195" text-anchor="middle" fill="#9C9A92">drones · LoRa</text>
  <text class="label-ts" x="155" y="320" text-anchor="middle" fill="#9C9A92">drones · LoRa</text>

  <!-- Field transmitters: N1, N1.1, N1.2, N1.2.1, N1.2.2, N2.1 -->
  <g fill="#B4B2A9">
    <circle cx="220" cy="100" r="2.5"/>
    <circle cx="245" cy="102" r="2.5"/>
    <circle cx="270" cy="100" r="2.5"/>
  </g>
  <g fill="#B4B2A9">
    <circle cx="395" cy="20" r="2.5"/>
    <circle cx="425" cy="22" r="2.5"/>
    <circle cx="380" cy="30" r="2.5"/>
    <circle cx="445" cy="32" r="2.5"/>
  </g>
  <g fill="#B4B2A9">
    <circle cx="395" cy="218" r="2.5"/>
    <circle cx="425" cy="220" r="2.5"/>
    <circle cx="380" cy="228" r="2.5"/>
  </g>
  <g fill="#B4B2A9">
    <circle cx="555" cy="100" r="2.5"/>
    <circle cx="595" cy="102" r="2.5"/>
    <circle cx="540" cy="110" r="2.5"/>
    <circle cx="610" cy="112" r="2.5"/>
  </g>
  <g fill="#B4B2A9">
    <circle cx="555" cy="252" r="2.5"/>
    <circle cx="595" cy="254" r="2.5"/>
    <circle cx="540" cy="262" r="2.5"/>
    <circle cx="610" cy="262" r="2.5"/>
  </g>
  <g fill="#B4B2A9">
    <circle cx="395" cy="300" r="2.5"/>
    <circle cx="425" cy="302" r="2.5"/>
    <circle cx="380" cy="310" r="2.5"/>
    <circle cx="445" cy="312" r="2.5"/>
  </g>

  <!-- Legend -->
  <rect x="40" y="470" width="600" height="36" rx="6" fill="none" stroke="#5F5E5A" stroke-width="0.5" stroke-dasharray="4 3"/>
  <rect x="60" y="482" width="14" height="10" rx="2" fill="#3C3489" stroke="#AFA9EC" stroke-width="0.5"/>
  <text class="label-ts" x="82" y="491" dominant-baseline="central" fill="#9C9A92">Hub</text>
  <rect x="130" y="482" width="14" height="10" rx="2" fill="#085041" stroke="#5DCAA5" stroke-width="0.5"/>
  <text class="label-ts" x="152" y="491" dominant-baseline="central" fill="#9C9A92">Node</text>
  <g fill="#B4B2A9">
    <circle cx="220" cy="487" r="2.5"/>
    <circle cx="228" cy="489" r="2.5"/>
    <circle cx="234" cy="486" r="2.5"/>
  </g>
  <text class="label-ts" x="248" y="491" dominant-baseline="central" fill="#9C9A92">Field transmitters in surrounding villages</text>
</svg>
